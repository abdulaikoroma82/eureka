# =============================================================================
# IMAM (Integrated Management of Acute Malnutrition) knowledge pack
# =============================================================================
# Admission / discharge criteria for OTP (Outpatient Therapeutic Programme),
# SC (Stabilisation Centre) and TSFP (Targeted Supplementary Feeding).
# Thresholds follow common national CMAM protocols; edit to match yours.
# =============================================================================

programmes:
  otp:
    label: "Outpatient Therapeutic Programme (OTP)"
    admission:
      muac_cm_below: 11.5
      whz_below: -3          # weight-for-height z-score
      oedema: ["1", "2"]     # bilateral pitting oedema grade + / ++
    discharge:
      muac_cm_at_or_above: 12.5
      min_consecutive_visits: 2
  sc:
    label: "Stabilisation Centre (SC)"
    admission:
      note: "SAM with medical complications, failed appetite test, or oedema +++"
      oedema: ["3"]
  tsfp:
    label: "Targeted Supplementary Feeding Programme (TSFP)"
    admission:
      muac_cm_range: [11.5, 12.5]
      whz_range: [-3, -2]

# Deterministic classification expression the calculation engine can emit.
# Requires fields: ${muac}, ${oedema}.
admission_category_expression: >
  if(${oedema} != '0', 'otp',
    if(${muac} < 11.5, 'otp',
      if(${muac} < 12.5, 'tsfp', 'none')))

choice_lists:
  admission_type:
    - { name: "new", label: "New admission" }
    - { name: "relapse", label: "Relapse" }
    - { name: "readmission", label: "Readmission" }
    - { name: "transfer_in", label: "Transfer in" }
  discharge_outcome:
    - { name: "cured", label: "Cured" }
    - { name: "defaulter", label: "Defaulter" }
    - { name: "death", label: "Death" }
    - { name: "non_response", label: "Non-response" }
    - { name: "transfer_out", label: "Transfer out" }
  programme:
    - { name: "otp", label: "OTP" }
    - { name: "sc", label: "SC" }
    - { name: "tsfp", label: "TSFP" }

indicators:
  - name: sam_incidence
    label: "SAM admissions"
  - name: cure_rate
    label: "Cure rate (%)"
    dhis2: "IMAM_CURE_RATE"
  - name: defaulter_rate
    label: "Defaulter rate (%)"
    dhis2: "IMAM_DEFAULTER_RATE"
